apiVersion: dynatrace.com/v1beta6
kind: DynaKube
metadata:
  name: dynakube
  namespace: dynatrace
spec:
  # ${DT_TENANT_ID} é substituído pelo envsubst no step de deploy
  apiUrl: https://${DT_TENANT_ID}.live.dynatrace.com/api

  # Referencia o K8s Secret criado pelo CI/CD com os tokens
  # (opcional aqui: como o Secret tem o mesmo nome do DynaKube,
  # o operator já o encontraria por padrão)
  tokens: dynakube

  # cloudNativeFullStack = injeção automática via webhook
  # O Operator intercepta criação de pods e injeta o OneAgent
  # sem nenhuma mudança no Dockerfile da aplicação
  oneAgent:
    cloudNativeFullStack:
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists

      # O Operator só injeta o agente em pods de namespaces
      # que casem com este selector. Todo namespace recebe
      # automaticamente a label kubernetes.io/metadata.name
      # com o próprio nome — por isso dá pra selecionar por nome assim:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default